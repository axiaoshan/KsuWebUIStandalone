<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No WebUI</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #333333;
    --muted: #888888;
    --card: #f5f5f5;
    --border: #e0e0e0;
    color-scheme: light dark;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --fg: #e0e0e0;
      --muted: #999999;
      --card: #2a2a2a;
      --border: #3a3a3a;
    }
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }
  .container {
    text-align: center;
    max-width: 400px;
  }
  .icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .module-name {
    font-weight: 500;
    color: var(--fg);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128196;</div>
    <h1 id="title">No WebUI Available</h1>
    <p id="desc">This module does not provide a WebUI interface.</p>
    <p id="hint">You can manage this module through the module manager.</p>
  </div>
</body>
</html>
